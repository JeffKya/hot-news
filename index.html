<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热点新闻聚合 - 最近48小时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
        }

        .refresh-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(90deg, #7b2ff7, #00d4ff);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(123, 47, 247, 0.3);
        }

        .refresh-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 6px 25px rgba(123, 47, 247, 0.5);
        }

        .refresh-btn:active {
            transform: translateY(-50%) scale(0.98);
        }

        .refresh-btn.loading {
            opacity: 0.7;
            cursor: wait;
        }

        .refresh-icon {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .refresh-btn.loading .refresh-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            font-size: 1.3em;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .loading-subtext {
            color: #888;
            margin-top: 10px;
        }

        /* News Section */
        .section-title {
            font-size: 1.4em;
            margin: 30px 0 20px;
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), rgba(123, 47, 247, 0.15));
            border-left: 4px solid #00d4ff;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .news-tag {
            background: linear-gradient(90deg, #7b2ff7, #00d4ff);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
        }

        .news-tag.hot {
            background: linear-gradient(90deg, #ff512f, #f09819);
        }

        .news-time {
            color: #888;
            font-size: 0.85em;
        }

        .news-title {
            font-size: 1.15em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .news-content {
            color: #b0b0b0;
            font-size: 0.9em;
            flex-grow: 1;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .news-source {
            color: #00d4ff;
            font-size: 0.85em;
        }

        .news-link {
            color: #fff;
            text-decoration: none;
            padding: 8px 18px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .news-link:hover {
            background: rgba(0, 212, 255, 0.4);
            transform: scale(1.05);
        }

        /* Quick Links Section */
        .quick-links {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quick-links h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .quick-link {
            display: block;
            padding: 10px 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .quick-link:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: scale(1.02);
        }

        /* Connection Status */
        .connection-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 0.9em;
        }

        .connection-status.connected {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }

        .connection-status.disconnected {
            background: rgba(255, 82, 82, 0.15);
            color: #ff5252;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.95);
            color: white;
            padding: 18px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            transform: translateX(450px);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
            max-width: 350px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: rgba(255, 82, 82, 0.95);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .refresh-btn {
                position: relative;
                top: auto;
                right: auto;
                transform: none;
                margin: 20px auto 0;
            }
            .refresh-btn:hover {
                transform: scale(1.05);
            }
            .news-grid {
                grid-template-columns: 1fr;
            }
            .stats {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">🔄 正在扫描最新热点新闻...</div>
            <div class="loading-subtext">正在从各大权威媒体获取最新资讯</div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>🔥 热点新闻聚合</h1>
            <p class="subtitle">过去48小时国内外权威媒体热点资讯</p>
            <button class="refresh-btn" id="refreshBtn" onclick="refreshNews()">
                <span class="refresh-icon">🔄</span>
                实时刷新
            </button>
        </header>

        <div class="connection-status connected" id="connectionStatus">
            ✅ 后端服务已连接
        </div>
        <div style="text-align:center; margin-bottom:15px; font-size:0.85em; color:#666;">
            API地址: <span id="apiAddress" style="color:#00d4ff;">自动检测中...</span>
            <button onclick="showApiInput()" style="margin-left:10px; padding:5px 10px; background:rgba(0,212,255,0.2); border:1px solid #00d4ff; border-radius:5px; color:#00d4ff; cursor:pointer;">修改</button>
        </div>
        <div id="apiInputDiv" style="display:none; text-align:center; margin-bottom:15px;">
            <input type="text" id="apiInput" placeholder="如: http://192.168.1.100:5000" style="padding:8px 15px; border-radius:5px; border:1px solid #00d4ff; background:rgba(0,0,0,0.3); color:#fff; width:250px;">
            <button onclick="saveApiAddress()" style="padding:8px 15px; background:#00d4ff; border:none; border-radius:5px; color:#000; cursor:pointer; margin-left:5px;">保存</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                📊 总热点: <span class="stat-value" id="totalCount">--</span>
            </div>
            <div class="stat-item">
                🌐 覆盖平台: <span class="stat-value">8</span>
            </div>
            <div class="stat-item">
                ⏰ 时间范围: <span class="stat-value">48小时</span>
            </div>
            <div class="stat-item">
                🕐 最后更新: <span class="stat-value" id="lastUpdate">--:--:--</span>
            </div>
        </div>

        <!-- Quick Access Links -->
        <div class="quick-links">
            <h3>⚡ 快速访问权威新闻源</h3>
            <div class="links-grid">
                <a href="https://news.qq.com" target="_blank" class="quick-link">腾讯新闻</a>
                <a href="https://news.163.com" target="_blank" class="quick-link">网易新闻</a>
                <a href="https://www.sina.com.cn" target="_blank" class="quick-link">新浪新闻</a>
                <a href="https://www.toutiao.com" target="_blank" class="quick-link">今日头条</a>
                <a href="https://www.xinhuanet.com" target="_blank" class="quick-link">新华网</a>
                <a href="https://www.people.com.cn" target="_blank" class="quick-link">人民网</a>
                <a href="https://news.cctv.com" target="_blank" class="quick-link">央视新闻</a>
                <a href="https://news.bbc.com/zhongwen/simp" target="_blank" class="quick-link">BBC中文</a>
            </div>
        </div>

        <div id="newsContainer">
            <!-- News content will be dynamically inserted here -->
        </div>

        <footer>
            <p>📡 数据来源：腾讯网、网易、川观新闻、今日头条、中公教育等权威媒体</p>
            <p>⏰ 更新时间：<span id="footerUpdate">--</span></p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // API配置 - 自动检测服务器地址
        // 从URL参数或本地存储获取API地址
        function getApiBase() {
            // 1. 优先从URL参数获取 ?api=http://192.168.x.x:5000
            const urlParams = new URLSearchParams(window.location.search);
            const apiFromUrl = urlParams.get('api');
            if (apiFromUrl) {
                localStorage.setItem('api_base', apiFromUrl);
                return apiFromUrl;
            }
            
            // 2. 从本地存储获取
            const apiFromStorage = localStorage.getItem('api_base');
            if (apiFromStorage) {
                return apiFromStorage;
            }
            
            // 3. 默认使用 localhost
            return 'http://localhost:5000';
        }
        
        let API_BASE = getApiBase();
        
        // 显示当前API地址（调试用）
        console.log('当前API地址:', API_BASE);

                {title: '凝心聚力启新程', content: '2026年全国两会期间，习近平总书记统揽全局、引领航向，为"十五五"时期经济社会发展把脉定向', source: '昆明信息港', time: '03月17日 14:00', url: 'https://www.kunming.cn/news/c/2026-03-17/14025870.shtml', hot: true, category: '时政要闻'},

                {title: '快舟十一号遥七火箭一箭八星发射成功', content: '北京时间3月16日12时12分，快舟十一号运载火箭在酒泉卫星发射中心将8颗卫星送入预定轨道', source: '中国经济网', time: '03月16日 16:00', url: 'http://www.ce.cn/xwzx/gnsz/gdxw/202603/t20260316_2831262.shtml', hot: true, category: '科技'},
                {title: '"太空加油站"试验星成功发射', content: '快舟十一号固体运载火箭在酒泉卫星发射中心点火升空，太阳翼成功展开', source: '科学网', time: '03月16日 14:00', url: 'http://news.sciencenet.cn/htmlnews/2026/3/561549.shtm', hot: true, category: '科技'},
                {title: '快舟十一号遥七运载火箭发射保电任务', content: '国网酒泉供电公司圆满完成此次卫星发射供电保障任务', source: '澎湃新闻', time: '03月16日 15:00', url: 'https://www.thepaper.cn/newsDetail_forward_32782908', hot: false, category: '科技'}

                {title: '美国驻迪拜总领事馆遭伊朗无人机袭击', content: '美国驻阿联酋迪拜总领事馆遭无人机袭击导致起火，无人员伤亡报告', source: '腾讯新闻', time: '03月04日 10:00', url: 'https://new.qq.com/rain/a/20260304A068XQ00', hot: false, category: '国际'}
            ],
            finance: [
                {title: '国际油价暴涨创六年新高', content: '由于霍尔木兹海峡油轮运输停滞，纽约原油期货收于每桶74.56美元，涨幅4.67%', source: '腾讯新闻', time: '03月17日 09:00', url: 'https://new.qq.com/rain/a/20260304A068XQ00', hot: true, category: '财经'},

            ],
            infrastructure: [
                {title: '广西苍容浔江大桥正式通车', content: '目前世界最大跨径独柱式三塔空间缆悬索桥，全长1688米，主跨达520米', source: '今日头条', time: '03月01日 10:00', url: 'https://www.toutiao.com/article/7612235284998128171/', hot: true, category: '基建'},
                {title: '中国海警依法驱离日方渔船', content: '日本"朝丸"号渔船非法进入中国钓鱼岛领海，中国海警依法警告驱离', source: '川观新闻', time: '03月17日 11:00', url: 'https://cbgc.scol.com.cn/news/7391618', hot: false, category: '民生'},
                {title: '浙江八大流域全面进入禁渔期', content: '钱塘江、瓯江、椒江等八大流域3月1日起全面禁渔，保护水生生物资源', source: '今日头条', time: '03月01日 08:00', url: 'https://www.toutiao.com/article/7612235284998128171/', hot: false, category: '民生'}

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // Update connection status
        function updateConnectionStatus(connected) {
            const status = document.getElementById('connectionStatus');
            const apiAddr = document.getElementById('apiAddress');
            apiAddr.textContent = API_BASE;
            if (connected) {
                status.className = 'connection-status connected';
                status.textContent = '✅ 后端服务已连接';
            } else {
                status.className = 'connection-status disconnected';
                status.textContent = '⚠️ 后端服务未连接，使用离线数据';
            }
        }
        
        // 显示API输入框
        function showApiInput() {
            document.getElementById('apiInputDiv').style.display = 'block';
            document.getElementById('apiInput').value = API_BASE;
        }
        
        // 保存API地址
        function saveApiAddress() {
            const newApi = document.getElementById('apiInput').value.trim();
            if (newApi) {
                API_BASE = newApi;
                localStorage.setItem('api_base', newApi);
                document.getElementById('apiInputDiv').style.display = 'none';
                showToast('API地址已更新: ' + newApi, 'success');
                // 重新连接
                checkConnection();
            }
        }

        // Render news
        function renderNews(newsData) {
            const container = document.getElementById('newsContainer');
            const sections = [
                { key: 'politics', title: '📰 时政要闻', icon: '📰' },
                { key: 'tech', title: '🚀 科技前沿', icon: '🚀' },
                { key: 'international', title: '🌍 国际动态', icon: '🌍' },
                { key: 'finance', title: '💰 财经动态', icon: '💰' },
                { key: 'infrastructure', title: '🏗️ 基建与民生', icon: '🏗️' }
            ];

            let html = '';
            let totalNews = 0;

            sections.forEach(section => {
                const news = newsData[section.key];
                if (news && news.length > 0) {
                    totalNews += news.length;
                    html += `
                        <div class="section-title">${section.title}</div>
                        <div class="news-grid">
                    `;
                    
                    news.forEach((item, index) => {
                        html += `
                            <div class="news-card" style="animation-delay: ${index * 0.1}s">
                                <div class="news-header">
                                    <span class="news-tag ${item.hot ? 'hot' : ''}">${item.category || '热点'}</span>
                                    <span class="news-time">${item.time}</span>
                                </div>
                                <div class="news-title">${item.title}</div>
                                <div class="news-content">${item.content || ''}</div>
                                <div class="news-footer">
                                    <span class="news-source">${item.source}</span>
                                    <a href="${item.url}" target="_blank" class="news-link">阅读原文 →</a>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                }
            });

            container.innerHTML = html;
            
            // Update stats
            document.getElementById('totalCount').textContent = totalNews;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            document.getElementById('footerUpdate').textContent = new Date().toLocaleDateString('zh-CN');
        }

        // Fetch news from API
        async function fetchNews(showLoading = false) {
            if (showLoading) {
                const btn = document.getElementById('refreshBtn');
                const overlay = document.getElementById('loadingOverlay');
                btn.classList.add('loading');
                btn.innerHTML = '<span class="refresh-icon">🔄</span> 刷新中...';
                overlay.classList.add('show');
            }

            try {
                const response = await fetch(`${API_BASE}/api/news`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        updateConnectionStatus(true);
                        renderNews(result.data);
                        return result;
                    }
                }
                throw new Error('API响应异常');
            } catch (error) {
                console.error('获取新闻失败:', error);
                updateConnectionStatus(false);
                // 使用离线数据
                renderNews(fallbackData);
                return null;
            } finally {
                if (showLoading) {
                    const btn = document.getElementById('refreshBtn');
                    const overlay = document.getElementById('loadingOverlay');
                    setTimeout(() => {
                        btn.classList.remove('loading');
                        btn.innerHTML = '<span class="refresh-icon">🔄</span> 实时刷新';
                        overlay.classList.remove('show');
                    }, 500);
                }
            }
        }

        // Refresh news
        async function refreshNews() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            btn.innerHTML = '<span class="refresh-icon">🔄</span> 刷新中...';
            
            try {
                // 尝试调用刷新API
                const response = await fetch(`${API_BASE}/api/news/refresh`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        updateConnectionStatus(true);
                        renderNews(result.data);
                        showToast('✅ 热点新闻已更新！', 'success');
                    }
                } else {
                    throw new Error('刷新失败');
                }
            } catch (error) {
                console.error('刷新失败:', error);
                // 回退到获取API
                await fetchNews(false);
                showToast('⚠️ 使用缓存数据，请确保后端服务运行中', 'error');
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = '<span class="refresh-icon">🔄</span> 实时刷新';
            }
        }

        // Check backend connection on load
        async function checkConnection() {
            try {
                const response = await fetch(`${API_BASE}/health`, {
                    method: 'GET'
                });
                if (response.ok) {
                    updateConnectionStatus(true);
                    await fetchNews(false);
                } else {
                    updateConnectionStatus(false);
                    renderNews(fallbackData);
                }
            } catch (error) {
                console.error('连接检查失败:', error);
                updateConnectionStatus(false);
                renderNews(fallbackData);
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            checkConnection();
            
            // Show hint on first visit
            if (!localStorage.getItem('hotspotHintShown')) {
                setTimeout(() => {
                    showToast('💡 点击"实时刷新"按钮获取最新热点', 'success');
                    localStorage.setItem('hotspotHintShown', 'true');
                }, 2000);
            }
        });
    </script>
</body>
</html>
